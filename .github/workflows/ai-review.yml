jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v3

      - run: sudo apt-get update && sudo apt-get install -y jq

      - name: Read Source Code
        run: |
          if [ ! -f "main.py" ]; then
            echo "main.py not found!"
            exit 1
          fi
          cat main.py > source.txt

      - name: Call Qwen API
        run: |
          CODE=$(jq -Rs . < source.txt)

          RESPONSE=$(curl -s https://dashscope-intl.aliyuncs.com/api/v1/services/aigc/text-generation/generation \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.QWEN_API_KEY }}" \
            -d "{
              \"model\": \"qwen-plus\",
              \"input\": {
                \"messages\": [
                  {\"role\":\"system\",\"content\":\"You are a strict DevSecOps auditor. Respond ONLY in valid JSON with keys: risk_level, issues, summary.\"},
                  {\"role\":\"user\",\"content\":\"Review this FastAPI code.\"},
                  {\"role\":\"user\",\"content\": $CODE}
                ]
              }
            }")

          echo "$RESPONSE" > raw.json

          CONTENT=$(jq -r '.output.text // empty' raw.json)

          if [ -z "$CONTENT" ]; then
            echo '{"risk_level":"UNKNOWN","issues":[],"summary":"AI response empty"}' > review.json
          else
            echo "$CONTENT" | sed 's/```json//g' | sed 's/```//g' > review.json
          fi

      - name: Post Comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_BODY=$(cat review.json)

          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "{\"body\":\"🤖 AI Code Review Result\n\n\`\`\`json\n$COMMENT_BODY\n\`\`\`\"}" || true

      - name: Fail if Critical
        run: |
          RISK=$(jq -r '.risk_level // "UNKNOWN"' review.json)

          echo "Risk: $RISK"

          if [ "$RISK" = "CRITICAL" ]; then
            exit 1
          fi