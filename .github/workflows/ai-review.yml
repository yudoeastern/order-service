name: AI Code Review (Qwen Fixed)

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Penting untuk mendapatkan diff history

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Prepare Code Context (Dynamic Diff)
        run: |
          # Jika PR, ambil diff. Jika push biasa, ambil file yang diubah terakhir
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...${{ github.head_ref }} > diff_context.txt
          else
            git diff HEAD~1 HEAD > diff_context.txt
          fi
          
          # Fallback jika tidak ada diff (misal commit pertama)
          if [ ! -s diff_context.txt ]; then
             echo "No changes detected or initial commit, reviewing main.py as fallback"
             cat main.py > diff_context.txt 2>/dev/null || echo "No code to review" > diff_context.txt
          fi

      - name: Call Qwen API (DashScope International)
        id: qwen_call
        run: |
          # 1. Baca diff context sebagai raw string
          CODE_CONTEXT=$(cat diff_context.txt)

          # 2. Build JSON payload MENGGUNAKAN JQ (Aman dari special characters)
          #    --arg dan --argjson memastikan semua karakter di-escape dengan benar
          PAYLOAD=$(jq -n \
            --arg model "qwen-plus" \
            --arg context "$CODE_CONTEXT" \
            --arg api_key "${{ secrets.QWEN_API_KEY }}" \
            '{
              "model": $model,
              "input": {
                "messages": [
                  {
                    "role": "system",
                    "content": "You are a strict DevSecOps auditor. Respond ONLY in valid raw JSON (no markdown blocks) with keys: risk_level (LOW/MEDIUM/HIGH/CRITICAL), issues (array of strings), summary (string)."
                  },
                  {
                    "role": "user",
                    "content": "Review the following git diff and classify the overall risk_level. \n\nDiff Content:\n\($context)"
                  }
                ]
              },
              "parameters": {
                "result_format": "message"
              }
            }')

          # 3. Call API dengan payload yang sudah valid
          RESPONSE=$(curl -s -w "\n%{http_code}" https://dashscope-intl.aliyuncs.com/api/v1/services/aigc/text-generation/generation \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.QWEN_API_KEY }}" \
            -d "$PAYLOAD")
          
          # 4. Pisahkan body response dan HTTP code
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ API Request Failed with code $HTTP_CODE"
            echo "Response Body: $BODY"
            # Jangan exit 1 disini jika ingin workflow tetap jalan untuk posting comment error
            echo '{"risk_level": "ERROR", "issues": ["API Request Failed"], "summary": "'"$BODY"'"}' > review.json
          else
            echo "$BODY" > raw_response.json

            # 5. Extract content dengan error handling
            CONTENT=$(jq -r '.output.choices[0].message.content // empty' raw_response.json)
            
            if [ -z "$CONTENT" ]; then
              echo "⚠️ Warning: Could not extract content from API response."
              echo '{"risk_level": "UNKNOWN", "issues": ["API parsing failed"], "summary": "Failed to parse AI response"}' > review.json
            else
              # Bersihkan markdown block jika ada, lalu validasi JSON
              CLEAN_CONTENT=$(echo "$CONTENT" | sed 's/```json//g' | sed 's/```//g' | jq -c . 2>/dev/null)
              
              if [ $? -ne 0 ]; then
                 echo "⚠️ Warning: Content is not valid JSON. Attempting fallback..."
                 echo "{\"risk_level\": \"UNKNOWN\", \"issues\": [\"JSON parsing failed\"], \"summary\": \"$(echo "$CONTENT" | head -c 200)\"}" > review.json
              else
                 echo "$CLEAN_CONTENT" > review.json
              fi
            fi
          fi

      - name: Post AI Review Comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Baca hasil review
          if [ ! -f review.json ]; then
            echo "Review file not found"
            exit 0
          fi
          
          # Format comment body
          RISK=$(jq -r '.risk_level // "UNKNOWN"' review.json)
          SUMMARY=$(jq -r '.summary // "No summary"' review.json)
          ISSUES=$(jq -r '.issues[]?' review.json | sed 's/^/- /')
          
          COMMENT="### 🤖 AI Code Review Result
          
          **Risk Level:** $RISK
          
          **Summary:** 
          $SUMMARY
          
          **Issues Found:**
          $ISSUES
          
          <details>
          <summary>View Raw JSON</summary>
          
          \`\`\`json
          $(cat review.json | jq -c .)
          \`\`\`
          </details>"

          # Perbaikan URL: Hapus spasi berlebih pada repos/
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "{\"body\": $(echo "$COMMENT" | jq -Rs .)}" || echo "⚠️ Failed to post comment"

      - name: Check Risk Level (Gatekeeping)
        run: |
          RISK=$(jq -r '.risk_level' review.json 2>/dev/null || echo "UNKNOWN")
          echo "Detected Risk Level: $RISK"

          if [ "$RISK" = "CRITICAL" ]; then
            echo "❌ Critical issue detected. Failing pipeline."
            exit 1
          elif [ "$RISK" = "UNKNOWN" ]; then
            echo "⚠️ Risk level unknown. Pipeline continues but check logs."
          else
            echo "✅ No critical issues. Pipeline continues."
          fi
