name: AI Code Review

on:
  push:
    branches: [ main ]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Read Source Code
        run: |
          echo "Reading main.py..."
          cat main.py > source.txt

      - name: Call Qwen API (Alibaba Model Studio)
        run: |
          CODE=$(jq -Rs . < source.txt)

          RESPONSE=$(curl -s https://dashscope-intl.aliyuncs.com/api/v1/services/aigc/text-generation/generation \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEEPSEEK_API_KEY }}" \
            -d "{
              \"model\": \"qwen-plus\",
              \"input\": {
                \"messages\": [
                  {
                    \"role\": \"system\",
                    \"content\": \"You are a strict DevSecOps auditor. Respond ONLY in valid JSON with keys: risk_level, issues, summary.\"
                  },
                  {
                    \"role\": \"user\",
                    \"content\": \"Review this FastAPI code and classify overall risk_level as LOW, MEDIUM, HIGH, or CRITICAL.\"
                  },
                  {
                    \"role\": \"user\",
                    \"content\": $CODE
                  }
                ]
              }
            }")

          echo "$RESPONSE" > raw.json
          echo "===== RAW QWEN RESPONSE ====="
          cat raw.json

          # Extract text output
          CONTENT=$(cat raw.json | jq -r '.output.text')

          echo "$CONTENT" > review.json

          echo "===== PARSED REVIEW.JSON ====="
          cat review.json

      - name: Validate JSON Format
        run: |
          cat review.json | jq .

      - name: Check Risk Level
        run: |
          RISK=$(cat review.json | jq -r '.risk_level')

          echo "Detected Risk Level: $RISK"

          if [ "$RISK" = "CRITICAL" ]; then
            echo "❌ Critical issue detected. Failing pipeline."
            exit 1
          else
            echo "✅ No critical issue. Pipeline continues."
          fi